version: '3.8'

services:
  backend:
    image: ghcr.io/freemen810/dns-monitoring:latest
    container_name: dns-monitoring-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=*
      - TZ=${TZ:-Asia/Singapore}
      - DEFAULT_DNS_SERVER=1.1.1.1
      - QUERY_TIMEOUT_MS=5000
      - LOG_LEVEL=info
      - QUERY_RETENTION_DAYS=30
    volumes:
      - dns-data:/app/data
    networks:
      - dns-monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    expose:
      - "3000"

  frontend:
    image: ghcr.io/freemen810/dns-monitoring:latest
    container_name: dns-monitoring-frontend
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Singapore}
      - VITE_API_URL=http://localhost/api
    networks:
      - dns-monitoring
    expose:
      - "5173"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: dns-monitoring-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - dns-monitoring
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  dns-monitoring:
    driver: bridge

volumes:
  dns-data:
    driver: local
  nginx-cache:
    driver: local
