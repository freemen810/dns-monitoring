version: '3.8'

################################################################################
# DNS Monitoring - Production Docker Compose Configuration
#
# This file deploys DNS Monitoring in production mode with:
# - Single container image (nginx + backend combined)
# - Data persistence via Docker volumes
# - Health checks for reliability
# - Environment-based configuration (no hardcoded values)
#
# Usage:
#   docker-compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Or use the deploy script (recommended):
#   ./deploy.sh
#
################################################################################

services:
  # ============================================================================
  # Backend API Service
  # ============================================================================
  backend:
    image: ghcr.io/freemen810/dns-monitoring:latest
    container_name: ${CONTAINER_PREFIX:-dns-monitoring}-backend
    restart: unless-stopped

    environment:
      # Node.js Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}

      # API Configuration
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - DEFAULT_DNS_SERVER=${DEFAULT_DNS_SERVER:-1.1.1.1}
      - QUERY_TIMEOUT_MS=${QUERY_TIMEOUT_MS:-5000}

      # Logging & Monitoring
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Data Retention (in days)
      - QUERY_RETENTION_DAYS=${QUERY_RETENTION_DAYS:-30}

      # System
      - TZ=${TZ:-Asia/Singapore}

    # Persistent data storage
    volumes:
      - dns-data:/app/data

    networks:
      - dns-monitoring

    # Health check for orchestration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    expose:
      - "3000"

    # Logging (optional: capture to file)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Nginx Reverse Proxy & Static File Server
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: ${CONTAINER_PREFIX:-dns-monitoring}-nginx
    restart: unless-stopped

    environment:
      - TZ=${TZ:-Asia/Singapore}

    ports:
      # HTTP (primary)
      - "${EXTERNAL_PORT:-80}:80"
      # HTTPS (requires SSL certs in ./ssl/)
      - "${EXTERNAL_HTTPS_PORT:-443}:443"

    volumes:
      # Nginx configuration (read-only)
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

      # Cache directory
      - nginx-cache:/var/cache/nginx

      # SSL certificates (optional, uncomment if using HTTPS)
      # - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro

    networks:
      - dns-monitoring

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================================
# Networks
# ============================================================================
networks:
  dns-monitoring:
    driver: bridge
    driver_opts:
      # Allow services to reach each other by name
      com.docker.network.bridge.enable_icc: "true"

# ============================================================================
# Volumes
# ============================================================================
volumes:
  # Database persistence (sqlite database file)
  dns-data:
    driver: local

  # Nginx cache directory
  nginx-cache:
    driver: local
