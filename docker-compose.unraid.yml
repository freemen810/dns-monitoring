version: '3.8'

services:
  app:
    image: ghcr.io/freemen810/dns-monitoring:latest
    container_name: dns-monitoring
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=*
      - TZ=${TZ:-Asia/Singapore}
      - DEFAULT_DNS_SERVER=1.1.1.1
      - QUERY_TIMEOUT_MS=5000
      - LOG_LEVEL=info
      - QUERY_RETENTION_DAYS=30
    volumes:
      - /mnt/user/appdata/dns-monitoring/data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
